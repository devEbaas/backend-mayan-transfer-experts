name: Deploy Backend

on:
  push:
    branches:
      - main

concurrency:
  group: deploy-backend
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: Production

    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm exec prisma generate

      - run: pnpm build

      - name: Install SSH key
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.SERVER_SSH_KEY }}

      - name: Add server to known_hosts
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Sync files
        run: |
          rsync -az --delete \
            --exclude=node_modules \
            --exclude=.git \
            --exclude=.env \
            ./ \
            ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/opt/mayan-transfer-backend/

      - name: Write .env
        env:
          NODE_ENV: ${{ vars.NODE_ENV }}
          PORT: ${{ vars.PORT }}
          API_PREFIX: ${{ vars.API_PREFIX }}
          CORS_ORIGIN: ${{ vars.CORS_ORIGIN }}
          FRONTEND_URL: ${{ vars.FRONTEND_URL }}
          DATABASE_URL: ${{ secrets.DATABASE_URL }}
          DIRECT_URL: ${{ secrets.DIRECT_URL }}
          JWT_SECRET: ${{ secrets.JWT_SECRET }}
          JWT_EXPIRES_IN: ${{ vars.JWT_EXPIRES_IN }}
          JWT_REFRESH_SECRET: ${{ secrets.JWT_REFRESH_SECRET }}
          JWT_REFRESH_EXPIRES_IN: ${{ vars.JWT_REFRESH_EXPIRES_IN }}
          LOG_LEVEL: ${{ vars.LOG_LEVEL }}
          STRIPE_SECRET_KEY: ${{ secrets.STRIPE_SECRET_KEY }}
          STRIPE_WEBHOOK_SECRET: ${{ secrets.STRIPE_WEBHOOK_SECRET }}
        run: |
          cat > deploy.env <<ENVEOF
          NODE_ENV=$NODE_ENV
          PORT=$PORT
          API_PREFIX=$API_PREFIX
          CORS_ORIGIN=$CORS_ORIGIN
          FRONTEND_URL=$FRONTEND_URL

          DATABASE_URL=$DATABASE_URL
          DIRECT_URL=$DIRECT_URL

          JWT_SECRET=$JWT_SECRET
          JWT_EXPIRES_IN=$JWT_EXPIRES_IN
          JWT_REFRESH_SECRET=$JWT_REFRESH_SECRET
          JWT_REFRESH_EXPIRES_IN=$JWT_REFRESH_EXPIRES_IN

          LOG_LEVEL=$LOG_LEVEL

          STRIPE_SECRET_KEY=$STRIPE_SECRET_KEY
          STRIPE_WEBHOOK_SECRET=$STRIPE_WEBHOOK_SECRET
          ENVEOF
          rsync -az deploy.env ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }}:/opt/mayan-transfer-backend/.env
          rm -f deploy.env

      - name: Install & Restart
        run: |
          ssh ${{ secrets.SERVER_USER }}@${{ secrets.SERVER_HOST }} << 'EOF'
            export NVM_DIR="$HOME/.nvm"
            source "$NVM_DIR/nvm.sh"

            cd /opt/mayan-transfer-backend

            corepack enable
            corepack prepare pnpm@9 --activate

            pnpm install --frozen-lockfile

            pnpm exec prisma generate

            npx prisma migrate deploy

            pm2 restart mayan-transfer-backend || pm2 start dist/src/main.js --name mayan-transfer-backend
            pm2 save
          EOF
